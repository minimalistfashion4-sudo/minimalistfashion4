<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bags | Minimalist Fashion</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- Profile Section (same as index) -->
        <section class="profile">
            <div class="profile-image">
                <img src="Minimalist Fashion.jpg" alt="Profile" />
            </div>
            <h1 class="username">@minimalist_fashion</h1>
            <div class="social-links">
                <a href="https://instagram.com/minimalist_fashion" target="_blank" class="social-icon">
                    <i class="fab fa-instagram"></i>
                </a>
                <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back</a>
            </div>
            <p class="description">Curated minimalist fashion essentials for the modern wardrobe.</p>
        </section>

        <!-- Bags Products -->
        <section class="products">
            <div class="product-grid">
                <div class="product-card">
                    <img src="bag2.jpeg" alt="Minimalist Tote Bag" />
                    <h3>Minimalist Tote Bag</h3>
                    <a href="https://myntr.it/eb61ifZ" target="_blank" class="buy-btn">
                        <i class="fas fa-shopping-bag"></i> Buy Now
                    </a>
                </div>
               
                
                <div class="product-card">
                    <img src="bag1.jpeg" alt="Bucket Bag Black" />
                    <h3>Black Bucket Bag</h3>
                    <a href="https://myntr.it/yts0x3a" target="_blank" class="buy-btn">
                        <i class="fas fa-shopping-bag"></i> Buy Now
                    </a>
                </div>
                <div class="product-card">
                    <img src="bag3.jpeg" alt="Top Handle Bag" />
                    <h3>Top Handle Satchel</h3>
                    <a href="https://myntr.it/CrwaLot" target="_blank" class="buy-btn">
                        <i class="fas fa-shopping-bag"></i> Buy Now
                    </a>
                </div>
               
                
            </div>
        </section>
    </div>
    <script src="js/script.js"></script>
</body>
</html>
